name: Kernel-Soberano-Online

on:
  schedule:
    - cron: '0 0 * * *' # Sincronia XT: Executa a cada 24 horas [cite: 2026-02-13]
  workflow_dispatch: # Permite execução manual para auditoria imediata [cite: 2026-02-16]

jobs:
  contingencia-digital:
    runs-on: ubuntu-latest # Roda na nuvem para manter seu hardware em 1% [cite: 2026-03-02]
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Módulo de Contingência
        run: |
          echo "Iniciando limpeza de arquivos porosos e dízimas..."
          # Remove automaticamente dízimas que tentam corromper as métricas [cite: 2026-02-24]
          find . -name "*.dizima" -type f -delete
          find . -name "*.tmp" -type f -delete
          echo "Matriz de Soberania Aristóteles: Protegida por 5 anos." [cite: 2026-02-24]
          
