name: Matriz Soberana Online 24/7

on:
  schedule:
    # Sincronia XT: Roda a cada 24 horas cravadas (Pinhão 24) [cite: 2026-02-13]
    - cron: '0 0 * * *' 
  workflow_dispatch: # Permite que você rode manualmente no Marco Zero

jobs:
  executar-contingencia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Hardware de Dados
        uses: actions/checkout@v4

      - name: Setup Python Soberano (Base 12) [cite: 2026-02-15]
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Injetar Kernel Kagglehub
        run: pip install kagglehub

      - name: Executar Dreno de Ruído e Upload [cite: 2026-02-24]
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python -c "
          import kagglehub
          kagglehub.dataset_upload(
              handle='<SEU_USUARIO>/gti-soberano',
              local_dataset_dir='./',
              ignore_patterns=['*.dizima', '*.tmp', 'projeto_poroso/'],
              version_notes='MANUTENÇÃO PERPÉTUA - ESCALA REAL'
          )"
          
